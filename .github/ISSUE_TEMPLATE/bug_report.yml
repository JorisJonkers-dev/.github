name: 'Bug report'
description: 'Report broken or incorrect behavior.'
title: '[Bug]: '
labels:
  - 'type: bug'
  - 'status: triage'
body:
  - type: 'textarea'
    id: 'summary'
    attributes:
      label: 'Summary'
      description: 'What is broken?'
    validations:
      required: true
  - type: 'textarea'
    id: 'reproduction'
    attributes:
      label: 'Reproduction'
      description: 'Commands, inputs, logs, screenshots, or steps.'
    validations:
      required: true
  - type: 'textarea'
    id: 'expected'
    attributes:
      label: 'Expected behavior'
    validations:
      required: true
