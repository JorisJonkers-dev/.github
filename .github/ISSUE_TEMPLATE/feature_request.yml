name: 'Feature request'
description: 'Propose a new capability.'
title: '[Feature]: '
labels:
  - 'type: feature'
  - 'status: triage'
body:
  - type: 'textarea'
    id: 'problem'
    attributes:
      label: 'Problem'
      description: 'What should become easier, safer, or possible?'
    validations:
      required: true
  - type: 'textarea'
    id: 'proposal'
    attributes:
      label: 'Proposal'
      description: 'Describe the intended outcome.'
    validations:
      required: true
