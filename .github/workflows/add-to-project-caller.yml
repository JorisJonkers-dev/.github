name: 'Add to Project'

'on':
  issues:
    types:
      - 'opened'
      - 'reopened'
      - 'transferred'
  pull_request_target:
    types:
      - 'opened'
      - 'reopened'
      - 'ready_for_review'

permissions:
  contents: 'read'

jobs:
  add-to-project:
    uses: 'JorisJonkers-dev/github-workflows/.github/workflows/add-to-project.yml@main'
    secrets:
      PROJECT_AUTOMATION_APP_ID: '${{ secrets.RELEASE_APP_ID }}'
      PROJECT_AUTOMATION_APP_PRIVATE_KEY: '${{ secrets.RELEASE_APP_PRIVATE_KEY }}'
