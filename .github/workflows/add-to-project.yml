name: Reusable · Add to Planboard

# Reusable workflow (workflow_call). It carries no event triggers — callers
# supply `on: issues / pull_request` and invoke this via `uses:`.
# See README.md for the org-wide design.

on:
  workflow_call:
    inputs:
      project-url:
        description: "Project (v2) URL to add issues/PRs to"
        required: false
        type: string
        # NOTE: this is an ORG project (/orgs/...).
        # actions/add-to-project accepts either; confirm the App token can write it.
        default: "https://github.com/orgs/JorisJonkers-dev/projects/1"
      labeled:
        description: "Comma-separated labels to filter on (empty = add everything)"
        required: false
        type: string
        default: ""
      label-operator:
        description: "Label filter operator: AND | OR | NOT (empty = no filter)"
        required: false
        type: string
        default: ""
    secrets:
      app-id:
        required: true
      app-private-key:
        required: true

# Least privilege: the real auth is the minted App token; the default
# GITHUB_TOKEN needs nothing beyond read.
permissions:
  contents: read

concurrency:
  # Harmless to add twice, but keeps duplicate runs from cluttering logs.
  group: add-to-project-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Mint short-lived App token (Projects scope)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.app-id }}
          private-key: ${{ secrets.app-private-key }}
          # owner must be the account that owns the Project so the token is
          # scoped to it rather than to the calling repository.
          owner: JorisJonkers-dev

      - name: Add issue/PR to Planboard
        uses: actions/add-to-project@5afcf98fcd03f1c2f92c3c83f58ae24323cc57fd  # v2.0.0
        with:
          project-url: ${{ inputs.project-url }}
          github-token: ${{ steps.app-token.outputs.token }}
          labeled: ${{ inputs.labeled }}
          label-operator: ${{ inputs.label-operator }}
